name: Fetch Google Reviews

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:        # Manual trigger from GitHub Actions tab
  push:
    branches: [main]
    paths:
      - 'fetch-reviews.js'  # Re-run if the script itself changes

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch reviews from Google Business Profile API
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: node fetch-reviews.js

      - name: Commit updated reviews if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add reviews-data.json
          git diff --staged --quiet || (git commit -m "Update reviews data [skip ci]" && git push)
